name: dashboard

# Runs in the cloud on GitHub's servers - independent of any personal computer.
on:
  schedule:
    - cron: '*/15 8-23 * * 1-5'   # every 15 min, 08:00-23:59 UTC (≈4am-8pm ET), weekdays — pre-market through after-hours. ~64 deploys/day, safely under Vercel's free 100/day.
  workflow_dispatch:           # lets you run it manually from the Actions tab

concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # lets the AI briefing/events be committed back so they persist between runs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market headlines (free, no AI)
        run: node fetch_news.mjs

      - name: Holdings snapshot (for the briefing)
        env:
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
        run: node scan_exits.mjs --json > exits.json

      - name: AI briefing + analyzed events (Claude, Gemini fallback; gated to ~30 min)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node make_briefing.mjs

      - name: Persist briefing + events between runs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.json events.json
          if git diff --cached --quiet; then
            echo "no AI change to persist"
          else
            git commit -m "AI briefing + events refresh [skip ci]"
            git push
          fi

      - name: Generate dashboard (report.html)
        env:
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
        run: node scan_smc.mjs

      - name: Assemble static site
        run: |
          mkdir -p site
          cp report.html site/index.html
          cp vercel.json site/ 2>/dev/null || true
          cp robots.txt site/ 2>/dev/null || true

      - name: Deploy to Vercel (same project = same URL)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel deploy site --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
